# latexindent.pl config for the AutoML_MOOCv2 lecture repo.
# See https://latexindentpl.readthedocs.io for full reference.
#
# Key choices:
#   - defaultIndent: 2 spaces (matches existing frame/itemize indent in the slides)
#   - modifyLineBreaks: 0   -- NEVER rewrap text. CLAUDE.md dictates "one sentence
#                              / thought per line" with manual line breaks, so
#                              letting latexindent rewrap would destroy author intent.
#   - indentPreamble: 0     -- do not touch the preamble of main.tex
#   - removeTrailingWhitespace: everywhere
#   - onlyOneBackUp + maxNumberOfBackUps: keep exactly one .bak file per run

defaultIndent: "  "
modifyLineBreaks: 0
indentPreamble: 0
removeTrailingWhitespace:
  beforeProcessing: 1
  afterProcessing: 1
onlyOneBackUp: 1
maxNumberOfBackUps: 1

# Treat these as normal environments (indent contents but don't touch line breaks).
# Add chapter-specific ones here if they misbehave.
noAdditionalIndent:
  document: 0
  frame: 0
  itemize: 0
  enumerate: 0
  columns: 0
  center: 0
